<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClarityAI - Intelligent BRD Generation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      
      /* Custom Animations */
      @keyframes draw {
        to { stroke-dashoffset: 0; }
      }
      @keyframes grow-bar {
        0% { height: 10%; }
        50% { height: 80%; }
        100% { height: 40%; }
      }
      @keyframes grow-bar-2 {
        0% { height: 30%; }
        50% { height: 60%; }
        100% { height: 90%; }
      }
      @keyframes float-particle {
        0%, 100% { transform: translateY(0) opacity(0.5); }
        50% { transform: translateY(-5px) opacity(1); }
      }
      @keyframes pulse-ring {
        0% { transform: scale(0.8); opacity: 0.5; }
        100% { transform: scale(1.2); opacity: 0; }
      }
      @keyframes typing {
        0%, 100% { width: 0; opacity: 0; }
        50% { width: 12px; opacity: 1; }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      @keyframes path-flow {
        to { stroke-dashoffset: -20; }
      }
      
      .animate-draw {
        stroke-dasharray: 20;
        stroke-dashoffset: 20;
        animation: draw 1s ease-out forwards;
      }
      .animate-grow-1 { animation: grow-bar 2s infinite ease-in-out; }
      .animate-grow-2 { animation: grow-bar-2 2.5s infinite ease-in-out; }
      .animate-float { animation: float-particle 3s infinite ease-in-out; }
      .animate-pulse-ring { animation: pulse-ring 2s infinite cubic-bezier(0, 0, 0.2, 1); }
      .animate-typing-dot { animation: blink 1s infinite; }
      .animate-flow-line { 
        stroke-dasharray: 5; 
        animation: path-flow 1s linear infinite; 
      }
    </style>
  <script type="importmap">
{

  }
}

</head>

</body>
</html>
